<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FESTA RADAR — 국내 뮤직 페스티벌·콘서트 트래커</title>
  <meta name="description" content="국내 뮤직/락 페스티벌과 콘서트 일정을 한 페이지에서. KOPIS 공식 데이터로 매일 자동 갱신." />

  <!-- 파비콘: 🎸 이모지 (SVG, 미지원 브라우저는 PNG 폴백) -->
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎸</text></svg>' />
  <link rel="alternate icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <!-- 링크 미리보기 (Open Graph / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tryingpig.github.io/festa-radar/" />
  <meta property="og:title" content="FESTA RADAR — 국내 뮤직 페스티벌·콘서트 트래커" />
  <meta property="og:description" content="국내 뮤직/락 페스티벌과 콘서트 일정을 한 페이지에서. KOPIS 공식 데이터로 매일 자동 갱신." />
  <meta property="og:image" content="https://tryingpig.github.io/festa-radar/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FESTA RADAR — 국내 뮤직 페스티벌·콘서트 트래커" />
  <meta name="twitter:description" content="국내 뮤직/락 페스티벌과 콘서트 일정을 한 페이지에서." />
  <meta name="twitter:image" content="https://tryingpig.github.io/festa-radar/og.png" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 시그니처 1: 마퀴 티커 (임박순 페스티벌) -->
  <div id="ticker" class="ticker" aria-label="임박한 페스티벌">
    <div class="ticker__track" id="ticker-track"><!-- JS --></div>
  </div>

  <header class="site-header">
    <div class="site-header__inner">
      <div class="brand">
        <h1 class="brand__title">FESTA&nbsp;RADAR</h1>
        <p class="brand__sub">국내 뮤직 페스티벌, 콘서트를 한 페이지에서 훑고 바로 예매</p>
      </div>
      <div class="updated" id="updated" aria-live="polite"></div>
    </div>
    <nav class="tabs" role="tablist" aria-label="보기 전환">
      <button class="tab is-active" id="tab-fest-list" role="tab" aria-selected="true">페스티벌 (리스트)</button>
      <button class="tab" id="tab-fest-cal" role="tab" aria-selected="false">페스티벌 (캘린더)</button>
      <button class="tab" id="tab-con-list" role="tab" aria-selected="false">콘서트 (리스트)</button>
      <button class="tab" id="tab-con-cal" role="tab" aria-selected="false">콘서트 (캘린더)</button>
    </nav>
  </header>

  <!-- 필터/정렬 바 (상단 고정) -->
  <div class="controls" role="region" aria-label="필터 및 정렬">
    <label class="ctl ctl--check" id="ctl-etc">
      <input type="checkbox" id="show-etc" checked />
      <span>기타 페스티벌</span>
    </label>
    <label class="ctl ctl--search" id="ctl-search" hidden>
      <span class="ctl__label">검색</span>
      <input type="search" id="concert-search" placeholder="아티스트·공연명" autocomplete="off" />
    </label>
    <label class="ctl">
      <span class="ctl__label">지역</span>
      <select id="region-select">
        <option value="">전체</option>
        <option value="수도권">수도권</option>
        <option value="영남">영남</option>
        <option value="호남">호남</option>
        <option value="충청">충청</option>
        <option value="강원">강원</option>
        <option value="제주">제주</option>
      </select>
    </label>
    <label class="ctl">
      <span class="ctl__label">정렬</span>
      <select id="sort-select">
        <option value="date">공연일 가까운순</option>
        <option value="recent">최근 등록순</option>
      </select>
    </label>
    <span class="controls__count" id="result-count" aria-live="polite"></span>
  </div>

  <!-- 카테고리 칩 필터 (major는 category, etc는 '기타'로 묶임) -->
  <div class="chips" id="cat-chips" role="group" aria-label="카테고리 필터">
    <button class="chip is-active" data-cat="" aria-pressed="true">전체</button>
    <button class="chip" data-cat="록" aria-pressed="false">록</button>
    <button class="chip" data-cat="인디/종합" aria-pressed="false">인디·종합</button>
    <button class="chip" data-cat="재즈" aria-pressed="false">재즈</button>
    <button class="chip" data-cat="EDM/워터" aria-pressed="false">EDM·워터</button>
    <button class="chip" data-cat="힙합" aria-pressed="false">힙합</button>
    <button class="chip" data-cat="K-POP" aria-pressed="false">K-POP</button>
    <button class="chip chip--etc" data-cat="기타" aria-pressed="false">기타</button>
  </div>

  <main class="main">
    <!-- 리스트 뷰 (월별 섹션) -->
    <section id="list-view" class="list-view" role="tabpanel" aria-labelledby="tab-list">
      <div id="months"><!-- JS --></div>
      <p id="list-empty" class="empty" hidden>조건에 맞는 공연이 없습니다.</p>
    </section>

    <!-- 캘린더 뷰 -->
    <section id="calendar-view" class="calendar-view" role="tabpanel"
             aria-labelledby="tab-calendar" hidden>
      <div class="cal-nav">
        <button class="cal-nav__btn" id="cal-prev" aria-label="이전 달">‹</button>
        <h2 class="cal-nav__title" id="cal-title"></h2>
        <button class="cal-nav__btn" id="cal-next" aria-label="다음 달">›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-weekhead">
          <span>일</span><span>월</span><span>화</span><span>수</span>
          <span>목</span><span>금</span><span>토</span>
        </div>
        <div id="cal-weeks"><!-- JS --></div>
      </div>
      <div id="cal-detail" class="cal-detail" aria-live="polite"><!-- 선택 카드 --></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>데이터: KOPIS 공연예술통합전산망 · 예매는 각 예매처에서. 티켓오픈일 알림은 준비 중입니다.</p>
  </footer>

  <script src="app.js"></script>

  <!-- 방문자 분석: GoatCounter (쿠키 없음·개인정보 미수집) -->
  <script data-goatcounter="https://festa-radar.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
